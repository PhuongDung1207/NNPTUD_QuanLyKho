<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quan ly nguoi dung</title>
  <link rel="stylesheet" href="/styles/users.css">
</head>
<body>
  <div class="users-layout">
    <aside id="sidebarMount" class="sidebar"></aside>

    <section class="main-panel">
      <header id="headerMount" class="page-header"></header>

      <main class="page-content">
        <section class="toolbar">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 20.3-4.8-4.8a7 7 0 1 0-1.4 1.4L19.6 21 21 20.3ZM5 10a5 5 0 1 1 10 0A5 5 0 0 1 5 10Z" fill="currentColor"/></svg>
            <input id="searchInput" type="search" placeholder="Search name, username, email...">
          </label>

          <label class="filter-box">
            <select id="statusFilter">
              <option value="all">All Status</option>
              <option value="active">Active</option>
              <option value="locked">Locked</option>
              <option value="inactive">Inactive</option>
            </select>
          </label>
        </section>

        <input id="userImportInput" type="file" accept=".xlsx,.xls" hidden>

        <section class="table-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>NAME</th>
                  <th>ROLE</th>
                  <th>JOINED</th>
                  <th>STATUS</th>
                  <th>ACTIONS</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>

          <div class="table-footer">
            <p id="tableSummary">0 user(s) total</p>
            <button class="page-badge" type="button">1</button>
          </div>
        </section>

        <section class="stats-grid">
          <article class="stat-card">
            <div class="stat-icon total">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-7 8v-1c0-2.2 3.1-4 7-4s7 1.8 7 4v1H5Zm14-8a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" fill="currentColor"/></svg>
            </div>
            <div>
              <p>TOTAL USERS</p>
              <strong id="totalUsersCount">0</strong>
            </div>
          </article>

          <article class="stat-card">
            <div class="stat-icon active">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.5 0-6.5 1.7-6.5 3.8V20h13v-2.2C18.5 15.7 15.5 14 12 14Zm7.7-6.6-1.4-1.4-3.3 3.3-1.7-1.7-1.4 1.4 3.1 3.1 4.7-4.7Z" fill="currentColor"/></svg>
            </div>
            <div>
              <p>ACTIVE</p>
              <strong id="activeUsersCount">0</strong>
            </div>
          </article>

          <article class="stat-card">
            <div class="stat-icon locked">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 10V8a5 5 0 1 0-10 0v2H5v10h14V10h-2Zm-8 0V8a3 3 0 1 1 6 0v2H9Zm3 7a2 2 0 1 1 2-2 2 2 0 0 1-2 2Z" fill="currentColor"/></svg>
            </div>
            <div>
              <p>LOCKED</p>
              <strong id="lockedUsersCount">0</strong>
            </div>
          </article>
        </section>
      </main>
    </section>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" hidden></div>

  <section id="userModal" class="modal-shell" hidden aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-7 1a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm0 2c-2.7 0-5 1.3-5 3v1h10v-1c0-1.7-2.3-3-5-3Zm14-9h-2V3h-2v2h-2v2h2v2h2V7h2V5Z" fill="currentColor"/></svg>
          <span>Add New User</span>
        </h2>

        <button id="closeUserModal" class="modal-close" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18.3 7.1-1.4-1.4L12 10.6 7.1 5.7 5.7 7.1l4.9 4.9-4.9 4.9 1.4 1.4 4.9-4.9 4.9 4.9 1.4-1.4-4.9-4.9 4.9-4.9Z" fill="currentColor"/></svg>
        </button>
      </div>

      <form id="userForm" class="modal-form">
        <p id="userFormModeNotice" class="form-note" hidden></p>

        <label class="form-field">
          <span>Full name <em>*</em></span>
          <input id="fullNameInput" name="fullName" type="text" placeholder="Enter full name..." required>
        </label>

        <label class="form-field">
          <span>Username <em>*</em></span>
          <input id="usernameInput" name="username" type="text" placeholder="Enter username..." maxlength="60" required>
          <small id="usernameHint">Username cannot be changed after account creation</small>
        </label>

        <label class="form-field">
          <span>Email</span>
          <input id="emailInput" name="email" type="email" placeholder="Enter email...">
        </label>

        <label class="form-field">
          <span>Phone</span>
          <input id="phoneInput" name="phone" type="tel" placeholder="Enter phone number..." maxlength="20">
        </label>

        <label class="form-field">
          <span>Avatar URL</span>
          <input id="avatarUrlInput" name="avatarUrl" type="url" placeholder="https://example.com/avatar.jpg">
          <small>Optional image URL for the user profile</small>
        </label>

        <label class="form-field">
          <span>Password</span>
          <div class="password-field">
            <input id="passwordInput" name="password" type="password" placeholder="Enter password..." minlength="8" maxlength="64" required>
            <button id="togglePasswordButton" class="icon-button password-button" type="button" aria-label="Show password">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7c4.6 0 8.2 2.9 9.5 5-1.3 2.1-4.9 5-9.5 5S3.8 14.1 2.5 12C3.8 9.9 7.4 7 12 7Zm0 2c-2.7 0-5 1.7-6.6 3 1.6 1.3 3.9 3 6.6 3s5-1.7 6.6-3c-1.6-1.3-3.9-3-6.6-3Zm0 1.5A2.5 2.5 0 1 1 9.5 13 2.5 2.5 0 0 1 12 10.5Z" fill="currentColor"/></svg>
            </button>
          </div>
          <small id="passwordHint">8-64 characters, include uppercase, lowercase, number, and special character</small>
        </label>

        <label class="form-field">
          <span>Status <em>*</em></span>
          <select id="statusInput" name="status" required>
            <option value="active">ACTIVE</option>
            <option value="locked">LOCKED</option>
            <option value="inactive">INACTIVE</option>
          </select>
        </label>

        <label class="form-field">
          <span>Role <em>*</em></span>
          <select id="roleInput" name="role" required>
            <option value="">Loading roles...</option>
          </select>
          <small>Select one system role for this account</small>
        </label>

        <div class="modal-actions">
          <button id="cancelModalButton" class="secondary-button" type="button">Cancel</button>
          <button class="primary-button modal-submit" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 3H5a2 2 0 0 0-2 2v14l4-4h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Zm-5 10-4-4 1.4-1.4 2.6 2.6 5.6-5.6L19 6l-7 7Z" fill="currentColor"/></svg>
            <span>Save User</span>
          </button>
        </div>
      </form>
    </div>
  </section>

  <div id="importResultBackdrop" class="modal-backdrop" hidden></div>

  <section id="importResultModal" class="modal-shell" hidden aria-hidden="true">
    <div class="modal-card import-modal-card" role="dialog" aria-modal="true" aria-labelledby="importResultTitle">
      <div class="modal-header import-modal-header">
        <h2 id="importResultTitle">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 7.5 7.5l1.4 1.4 2.1-2.1V16h2V6.8l2.1 2.1 1.4-1.4L12 3Zm-7 13h2v3h10v-3h2v5H5v-5Z" fill="currentColor"/></svg>
          <span>Ket qua import user</span>
        </h2>

        <button id="closeImportResultButton" class="modal-close" type="button" aria-label="Close import result">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18.3 7.1-1.4-1.4L12 10.6 7.1 5.7 5.7 7.1l4.9 4.9-4.9 4.9 1.4 1.4 4.9-4.9 4.9 4.9 1.4-1.4-4.9-4.9 4.9-4.9Z" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="import-result-body">
        <p id="importResultMessage" class="import-result-message">-</p>
        <div id="importResultStats" class="import-result-stats"></div>

        <div id="importWarningSection" class="import-section" hidden>
          <h4>Luu y</h4>
          <ul id="importWarningList" class="import-list"></ul>
        </div>

        <div id="importFailureSection" class="import-section" hidden>
          <h4>Dong loi</h4>
          <ul id="importFailureList" class="import-list import-list-danger"></ul>
        </div>
      </div>
    </div>
  </section>

  <script src="/scripts/users.js"></script>
</body>
</html>
