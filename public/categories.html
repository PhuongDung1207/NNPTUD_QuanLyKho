<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | The Precision Ledger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar-target" class="app-sidebar"></aside>

        <main class="app-main">
            <header class="main-header">
                <div class="header-breadcrumb">
                    <span>Inventory</span>
                    <span class="divider">/</span>
                    <span class="active">Categories</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </button>
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=Alexander&background=004f69&color=fff" alt="">
                    </div>
                </div>
            </header>

            <div id="view-container" data-view="categories">
                <div class="view-header">
                    <div class="view-title">
                        <h1>Product Categories</h1>
                        <p>Organize products into hierarchical groups for better tracking.</p>
                    </div>
                    <button class="btn btn-primary" id="open-modal-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New Category
                    </button>
                </div>

                <div class="stats-row" style="margin-bottom: 30px;">
                    <div class="stat-card">
                        <p class="stat-label">Total Categories</p>
                        <p id="stat-total" class="stat-value">0</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Active Groups</p>
                        <p id="stat-active" class="stat-value">0</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Inactive / Archive</p>
                        <p id="stat-draft" class="stat-value">0</p>
                    </div>
                </div>

                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Category Name</th>
                                <th>Code</th>
                                <th>Parent</th>
                                <th>Status</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Categories load here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Create New Category</h2>
                <button class="close-modal" id="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="create-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Category Name *</label>
                            <input type="text" id="name" name="name" required placeholder="e.g. Smartphones">
                        </div>
                        <div class="form-group">
                            <label for="code">Category Code *</label>
                            <input type="text" id="code" name="code" required placeholder="e.g. CAT-MOB">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="parent">Parent Category (Optional)</label>
                        <select id="select-parent" name="parent">
                            <option value="">None (Top Level)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <textarea id="description" name="description" rows="3"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline cancel-form">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function popSelect(id, endpoint) {
            const select = document.getElementById(id);
            if (!select) return;

            try {
                const res = await fetch(`/api/v1/${endpoint}`);
                const json = await res.json();
                const list = json.data || [];

                list.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item._id;
                    option.textContent = item.name + ' (' + item.code + ')';
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Failed to populate select:', err);
            }
        }
        popSelect('select-parent', 'categories');
    </script>
</body>
</html>
