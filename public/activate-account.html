<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Account</title>
  <link rel="stylesheet" href="/styles/activate-account.css">
</head>
<body>
  <main class="activation-shell">
    <section class="activation-card">
      <div class="activation-head">
        <p class="eyebrow">Warehouse Management</p>
        <h1>Activate your account</h1>
        <p class="lead">
          Set your password to finish account activation. Your account will remain inactive until this step is completed.
        </p>
      </div>

      <div id="activationSummary" class="summary-card" hidden>
        <p class="summary-label">Invitation for</p>
        <strong id="activationName">-</strong>
        <span id="activationEmail">-</span>
        <small id="activationExpiresAt">-</small>
      </div>

      <p id="activationStatus" class="status-message" hidden></p>

      <form id="activationForm" class="activation-form">
        <label class="field">
          <span>New password</span>
          <input id="passwordInput" type="password" placeholder="Enter new password" minlength="8" maxlength="64" required>
        </label>

        <label class="field">
          <span>Confirm password</span>
          <input id="confirmPasswordInput" type="password" placeholder="Re-enter password" minlength="8" maxlength="64" required>
        </label>

        <p class="password-hint">
          Password must be 8-64 characters and include uppercase, lowercase, number, and special character.
        </p>

        <button id="activateButton" class="primary-button" type="submit">
          <span>Activate account</span>
        </button>
      </form>

      <div class="footer-actions">
        <a class="text-link" href="/login">Back to login</a>
      </div>
    </section>
  </main>

  <script src="/scripts/activate-account.js"></script>
</body>
</html>
