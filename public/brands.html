<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands | The Precision Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar-target" class="app-sidebar"></aside>

        <!-- Main Content -->
        <main class="app-main">
            <header class="main-header">
                <div class="header-search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="global-search" placeholder="Search brands...">
                </div>
            </header>

            <div class="main-content" id="view-container" data-view="brands">
                <div class="view-header">
                    <div class="view-title">
                        <h1>Brands</h1>
                        <p>Manage and monitor global brand assets.</p>
                    </div>
                    <button class="btn btn-primary" id="open-modal-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New Brand
                    </button>
                </div>
                <div class="data-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Code</th>
                                <th>Origin</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Create New Brand</h3>
                <button class="close-modal" id="close-modal-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <form class="app-form" id="create-form">
                    <div class="form-group">
                        <label>Brand Name</label>
                        <input type="text" name="name" required placeholder="e.g. Samsung">
                    </div>
                    <div class="form-group">
                        <label>Brand Code</label>
                        <input type="text" name="code" required placeholder="e.g. SMS">
                    </div>
                    <div class="form-group">
                        <label>Country of Origin</label>
                        <input type="text" name="countryOfOrigin" placeholder="e.g. South Korea">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="3" placeholder="Additional details..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary cancel-form">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Brand</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
